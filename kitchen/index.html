<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Wow Kitchen | Smart KDS</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" type="text/css" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/moment.js/2.29.4/moment.min.js"></script>
    
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800;900&display=swap');
        
        body { font-family: 'Inter', sans-serif; overflow: hidden; transition: background-color 0.3s, color 0.3s; }
        
        /* Theme Classes */
        body.theme-dark { background-color: #0f172a; color: white; }
        body.theme-light { background-color: #f3f4f6; color: #1f2937; }
        
        /* Internal Card Colors */
        .theme-light .card-bg { background-color: #ffffff; border-color: #e5e7eb; }
        .theme-dark .card-bg { background-color: #1f2937; border-color: #374151; }
        
        .theme-light .text-mute { color: #6b7280; }
        .theme-dark .text-mute { color: #9ca3af; }

        /* Custom Scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #64748b; border-radius: 10px; }
        
        /* Animations */
        .card-enter { animation: slideUp 0.3s cubic-bezier(0.4, 0, 0.2, 1); }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        /* Status Colors */
        .status-pending { border-top-color: #ef4444 !important; } 
        .status-preparing { border-top-color: #eab308 !important; } 
        .status-ready { border-top-color: #22c55e !important; } 

        .blink-critical { animation: pulse-red 1s infinite; }
        @keyframes pulse-red {
            0%, 100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
            50% { box-shadow: 0 0 0 10px rgba(239, 68, 68, 0.3); }
        }

        /* Nav Item Styles */
        .nav-item.active { color: #ea580c; }
        .nav-item.active i { transform: scale(1.2); transition: transform 0.2s; }
        
        @media (min-width: 768px) {
            .nav-item.active { background-color: #ea580c; color: white; box-shadow: 0 4px 12px rgba(234, 88, 12, 0.3); }
            .nav-item.active i { transform: none; }
        }

        .item-done { text-decoration: line-through; opacity: 0.4; }
    </style>
</head>
<body class="theme-dark h-screen flex flex-col md:flex-row">

    <audio id="kitchen-sound" src="https://assets.mixkit.co/active_storage/sfx/2869/2869-preview.mp3"></audio>

    <main class="flex-1 flex flex-col h-screen overflow-hidden relative order-1 md:order-2">
        
        <header class="h-16 md:h-20 bg-gray-900 border-b border-gray-800 flex justify-between items-center px-4 md:px-6 shrink-0 z-10">
            <div class="flex items-center gap-2">
                <div class="md:hidden font-bold text-lg tracking-tight mr-2 text-white">WOW<span class="text-orange-500">KDS</span></div>
                <div class="flex bg-gray-800 rounded-lg p-1 border border-gray-700">
                    <button onclick="filterType('all')" id="filter-all" class="px-3 py-1 rounded text-[10px] md:text-xs font-bold bg-gray-600 text-white">All</button>
                    <button onclick="filterType('Dine-in')" id="filter-Dine-in" class="px-3 py-1 rounded text-[10px] md:text-xs font-bold text-gray-400 hover:text-white">Dine</button>
                    <button onclick="filterType('Takeaway')" id="filter-Takeaway" class="px-3 py-1 rounded text-[10px] md:text-xs font-bold text-gray-400 hover:text-white">Takeaway</button>
                </div>
            </div>

            <div class="flex items-center gap-3 md:gap-6">
                <div class="hidden lg:flex gap-4">
                    <div class="text-center"><span class="block text-xs text-gray-500 uppercase font-bold">Pending</span><span id="stat-pending" class="text-xl font-bold text-orange-500">0</span></div>
                    <div class="text-center"><span class="block text-xs text-gray-500 uppercase font-bold">Prep</span><span id="stat-prep" class="text-xl font-bold text-yellow-500">0</span></div>
                    <div class="text-center"><span class="block text-xs text-gray-500 uppercase font-bold">Ready</span><span id="stat-ready" class="text-xl font-bold text-green-500">0</span></div>
                </div>
                
                <div class="text-right">
                    <div id="clock-time" class="text-white text-xl md:text-2xl font-bold font-mono leading-none">00:00</div>
                    <div id="staff-display" class="text-[10px] md:text-xs text-orange-400 font-bold uppercase mt-1">CHEF</div>
                </div>
                
                <button onclick="toggleSound()" id="sound-btn" class="w-8 h-8 md:w-10 md:h-10 rounded-full bg-gray-800 hover:bg-gray-700 flex items-center justify-center border border-gray-700 transition">
                    <i class="fas fa-volume-mute text-xs md:text-base text-gray-400"></i>
                </button>
            </div>
        </header>

        <div id="content-area" class="flex-1 overflow-y-auto p-4 md:p-6 relative pb-24 md:pb-6 transition-colors duration-300">
            
            <div id="view-dashboard" class="view-section grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 xl:grid-cols-4 2xl:grid-cols-5 gap-4 md:gap-5"></div>

            <div id="empty-state" class="hidden col-span-full text-center mt-20 opacity-50">
                <i class="fas fa-utensils text-5xl md:text-6xl mb-4 text-gray-500"></i>
                <h2 class="text-xl md:text-2xl font-bold text-mute">No active orders</h2>
            </div>

            <div id="view-summary" class="view-section hidden max-w-4xl mx-auto">
                <h2 class="text-xl md:text-2xl font-bold mb-6 flex items-center gap-3 text-mute"><i class="fas fa-list-ol text-orange-500"></i> Item View</h2>
                <div class="bg-gray-800 rounded-xl overflow-hidden shadow-2xl border border-gray-700">
                    <table class="w-full text-left text-white">
                        <thead class="bg-gray-900 text-gray-400 text-xs md:text-sm uppercase">
                            <tr><th class="p-3 md:p-4">Item</th><th class="p-3 md:p-4 text-center">Qty</th><th class="p-3 md:p-4 text-right">Orders</th></tr>
                        </thead>
                        <tbody id="summary-table-body" class="divide-y divide-gray-700 text-sm md:text-base"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-history" class="view-section hidden">
                <h2 class="text-xl md:text-2xl font-bold mb-6 text-mute">Order History</h2>
                <div class="overflow-x-auto bg-gray-800 rounded-xl border border-gray-700">
                    <table class="w-full text-left min-w-[600px] text-white"> 
                        <thead class="bg-gray-900 text-gray-400 text-xs uppercase">
                            <tr><th class="p-4">ID</th><th class="p-4">Time</th><th class="p-4">Type</th><th class="p-4">Duration</th><th class="p-4 text-right">Action</th></tr>
                        </thead>
                        <tbody id="history-table-body" class="divide-y divide-gray-700 text-sm"></tbody>
                    </table>
                </div>
            </div>

            <div id="view-settings" class="view-section hidden max-w-2xl mx-auto">
                <h2 class="text-2xl font-bold mb-6 text-mute">System Settings</h2>
                <div class="bg-gray-800 p-6 rounded-xl border border-gray-700 shadow-xl">
                    
                    <div class="mb-6">
                        <label class="block text-gray-400 text-sm font-bold mb-2">Staff Name / Station Name</label>
                        <input type="text" id="setting-staff-name" class="w-full bg-gray-900 text-white border border-gray-600 rounded p-3 focus:border-orange-500 focus:outline-none" placeholder="e.g. Head Chef">
                    </div>

                    <div class="mb-6">
                        <label class="block text-gray-400 text-sm font-bold mb-2">Display Theme</label>
                        <div class="flex gap-4">
                            <button onclick="setTheme('dark')" class="flex-1 py-3 bg-gray-900 text-white border border-gray-600 rounded hover:border-orange-500">Dark Mode</button>
                            <button onclick="setTheme('light')" class="flex-1 py-3 bg-gray-100 text-gray-900 border border-gray-300 rounded hover:border-orange-500">Light Mode</button>
                        </div>
                    </div>

                    <div class="mt-8 pt-6 border-t border-gray-700 flex justify-end">
                        <button onclick="saveSettings()" class="bg-orange-600 hover:bg-orange-500 text-white font-bold py-2 px-6 rounded transition">Save Settings</button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <aside class="w-full md:w-64 bg-gray-900 border-t md:border-t-0 md:border-r border-gray-800 flex flex-row md:flex-col justify-between z-20 shadow-[0_-4px_6px_-1px_rgba(0,0,0,0.1)] md:shadow-2xl fixed bottom-0 md:relative h-16 md:h-auto order-2 md:order-1">
        
        <div class="hidden md:block">
            <div class="h-20 flex items-center justify-center border-b border-gray-800 bg-gray-900">
                <div class="flex items-center gap-3">
                    <div class="bg-gradient-to-br from-orange-500 to-red-600 p-2 rounded-lg">
                        <i class="fas fa-fire text-xl text-white"></i>
                    </div>
                    <span class="text-xl font-bold tracking-tight text-white">WOW<span class="text-orange-500">KDS</span></span>
                </div>
            </div>
        </div>

        <nav class="flex-1 flex flex-row md:flex-col justify-around md:justify-start items-center md:items-stretch p-0 md:p-4 md:space-y-2 w-full">
            
            <button onclick="switchView('dashboard')" id="nav-dashboard" class="nav-item active flex flex-col md:flex-row items-center md:gap-4 p-2 md:px-4 md:py-3 rounded-lg md:rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                <i class="fas fa-th-large text-xl md:text-lg mb-1 md:mb-0"></i>
                <span class="text-[10px] md:text-base md:font-medium">Orders</span>
            </button>
            
            <button onclick="switchView('summary')" id="nav-summary" class="nav-item flex flex-col md:flex-row items-center md:gap-4 p-2 md:px-4 md:py-3 rounded-lg md:rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all relative">
                <i class="fas fa-list-ol text-xl md:text-lg mb-1 md:mb-0"></i>
                <span class="text-[10px] md:text-base md:font-medium">Summary</span>
                <span id="badge-total-items" class="absolute top-1 right-2 md:top-auto md:right-4 bg-orange-600 text-white text-[10px] px-1.5 rounded-full md:static md:bg-gray-700 md:text-xs md:px-2 md:py-0.5">0</span>
            </button>

            <button onclick="switchView('history')" id="nav-history" class="nav-item flex flex-col md:flex-row items-center md:gap-4 p-2 md:px-4 md:py-3 rounded-lg md:rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all">
                <i class="fas fa-history text-xl md:text-lg mb-1 md:mb-0"></i>
                <span class="text-[10px] md:text-base md:font-medium">History</span>
            </button>

            <button onclick="switchView('settings')" id="nav-settings" class="nav-item flex flex-col md:flex-row items-center md:gap-4 p-2 md:px-4 md:py-3 rounded-lg md:rounded-xl text-gray-400 hover:bg-gray-800 hover:text-white transition-all md:mt-auto">
                <i class="fas fa-cog text-xl md:text-lg mb-1 md:mb-0"></i>
                <span class="text-[10px] md:text-base md:font-medium">Settings</span>
            </button>
        </nav>
    </aside>

    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getDatabase, ref, onValue, push, update, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-database.js";

        // --- 1. FIREBASE CONFIGURATION ---
        const firebaseConfig = {
            apiKey: "AIzaSyDSl6L3ym7G9wXJjZoCYGtU6oBuMyswMBA",
            authDomain: "gen-lang-client-0826078440.firebaseapp.com",
            databaseURL: "https://gen-lang-client-0826078440-default-rtdb.firebaseio.com", 
            projectId: "gen-lang-client-0826078440",
            storageBucket: "gen-lang-client-0826078440.firebasestorage.app",
            messagingSenderId: "198781436382",
            appId: "1:198781436382:web:041f1a6f57cc50dfa75d4f",
            measurementId: "G-XNB6HMBXN0"
        };

        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);

        // --- RESTAURANT ID EXTRACTION ---
        const urlParams = new URLSearchParams(window.location.search);
        const RESTAURANT_ID = urlParams.get('id');

        if (!RESTAURANT_ID) {
            alert("Error: Missing Restaurant ID in URL! Use ?id=YOUR_CAFE_ID");
            throw new Error("Missing Restaurant ID");
        }
        console.log("Kitchen connected to Restaurant:", RESTAURANT_ID);

        // --- 2. DATA STATE & VARS ---
        let orders = []; 
        let soundEnabled = false; 
        let currentFilter = 'all';
        let announcedOrders = new Set(); 
        
        // Settings State with Persistence
        let appSettings = JSON.parse(localStorage.getItem('wowKdsSettings')) || {
            theme: 'dark',
            staffName: 'Head Chef'
        };

        // Apply settings
        document.body.className = `theme-${appSettings.theme} h-screen flex flex-col md:flex-row`;
        document.getElementById('setting-staff-name').value = appSettings.staffName;
        document.getElementById('staff-display').innerText = appSettings.staffName;

        // --- 3. AUTO UNLOCK AUDIO (HIDDEN) ---
        // Browsers block audio until user clicks something. We listen for the first click anywhere.
        document.body.addEventListener('click', () => {
            if(!soundEnabled) {
                soundEnabled = true;
                const audio = document.getElementById("kitchen-sound");
                audio.play().then(() => {
                    audio.pause();
                    audio.currentTime = 0;
                }).catch(()=>{});
                
                // Visual confirmation
                const btn = document.getElementById("sound-btn");
                btn.innerHTML = '<i class="fas fa-volume-up text-green-500"></i>';
                Toastify({ text: "System Active 🔊", style: { background: "#10B981" }, duration: 2000 }).showToast();
            }
        }, { once: true }); // Only runs once

        function speakHindi(text) {
            if(!soundEnabled) return;
            window.speechSynthesis.cancel();
            
            const utter = new SpeechSynthesisUtterance(text);
            utter.lang = 'hi-IN'; 
            utter.rate = 1.0; 
            utter.pitch = 1.1;
            utter.volume = 1.0;
            window.speechSynthesis.speak(utter);
        }

        // --- 4. REALTIME LISTENER ---
        function initRealtimeListener() {
            const ordersRef = ref(db, `restaurants/${RESTAURANT_ID}/orders`);
            
            onValue(ordersRef, (snapshot) => {
                const data = snapshot.val();
                const prevCount = orders.length;
                
                orders = []; 
                if (data) {
                    Object.keys(data).forEach(key => {
                        orders.push({ id: key, ...data[key] });
                    });
                }
                
                // Sort by Timestamp
                orders.sort((a,b) => a.timestamp - b.timestamp);

                // Notification Logic
                if (orders.length > prevCount) {
                    const latest = orders[orders.length - 1];
                    // Alert only if order is recent (last 30 seconds)
                    if (latest && latest.timestamp && (Date.now() - latest.timestamp) < 30000) {
                        playChime();
                        setTimeout(() => speakHindi("Naya Order Aaya Hai"), 1000); 
                        
                        if(typeof Toastify !== 'undefined') {
                            Toastify({ 
                                text: "🔔 NEW ORDER #" + (latest.orderId || '---'), 
                                style: { background: "#ea580c" }, 
                                duration: 5000, 
                                position: "center" 
                            }).showToast();
                        }
                    }
                }

                renderDashboard();
                updateStats();
                if(!document.getElementById('view-summary').classList.contains('hidden')) renderSummary();
                if(!document.getElementById('view-history').classList.contains('hidden')) renderHistory();

            }, (error) => {
                console.error("Error:", error);
            });
        }

        // --- 5. ACTIONS ---
        window.updateStatus = (docId, action) => {
            let updateData = {};
            if (action === 'start_cooking') updateData = { status: 'preparing' };
            else if (action === 'mark_ready') updateData = { status: 'ready' };
            else if (action === 'complete') updateData = { status: 'completed', completedAt: Date.now() };

            update(ref(db, `restaurants/${RESTAURANT_ID}/orders/${docId}`), updateData);
        }

        window.recallOrder = (docId) => {
            update(ref(db, `restaurants/${RESTAURANT_ID}/orders/${docId}`), {
                status: 'preparing',
                completedAt: null
            });
        }

        // --- 6. SETTINGS LOGIC ---
        window.setTheme = (theme) => {
            appSettings.theme = theme;
            document.body.className = `theme-${theme} h-screen flex flex-col md:flex-row`;
        }

        window.saveSettings = () => {
            appSettings.staffName = document.getElementById('setting-staff-name').value;
            localStorage.setItem('wowKdsSettings', JSON.stringify(appSettings));
            document.getElementById('staff-display').innerText = appSettings.staffName;
            
            Toastify({ text: "Settings Saved!", style: { background: "#22c55e" } }).showToast();
            setTimeout(() => switchView('dashboard'), 500);
        }

        // --- 7. RENDERING ---
        function renderDashboard() {
            const container = document.getElementById("view-dashboard");
            const emptyState = document.getElementById("empty-state");
            
            const activeOrders = orders.filter(o => 
                ['pending', 'preparing', 'ready'].includes(o.status) &&
                (currentFilter === 'all' || o.orderType === currentFilter)
            );

            if(activeOrders.length === 0) {
                container.innerHTML = '';
                container.appendChild(emptyState);
                emptyState.classList.remove('hidden');
                return;
            }
            
            emptyState.classList.add('hidden');

            const activeIds = activeOrders.map(o => o.id);
            Array.from(container.children).forEach(child => {
                if(child.id !== 'empty-state' && !activeIds.includes(child.dataset.id)) {
                    child.remove();
                }
            });

            activeOrders.forEach(order => {
                let card = document.querySelector(`div[data-id="${order.id}"]`);
                let cName = order.customerName || (order.customer ? order.customer.name : 'Guest');
                let displayId = order.orderId || order.orderID || '---';

                // Robust Timestamp Check for Timer
                let orderTs = order.timestamp;
                if(!orderTs) orderTs = Date.now(); // Fallback if timestamp missing

                if(!card) {
                    card = document.createElement('div');
                    card.dataset.id = order.id;
                    card.className = `card-enter relative group flex flex-col h-[480px] rounded-xl shadow-xl border-t-[8px] card-bg`;
                    container.appendChild(card);
                }

                let statusColor = '';
                let btnHtml = '';
                let statusText = '';
                let statusBg = '';

                if(order.status === 'pending') {
                    statusColor = 'status-pending';
                    btnHtml = `<button onclick="updateStatus('${order.id}', 'start_cooking')" class="w-full bg-blue-600 hover:bg-blue-500 py-4 rounded-lg text-xl font-bold text-white shadow-lg flex items-center justify-center gap-2"><i class="fas fa-fire"></i> START COOKING</button>`;
                    statusText = 'PENDING';
                    statusBg = 'bg-red-600 text-white';
                } else if (order.status === 'preparing') {
                    statusColor = 'status-preparing';
                    btnHtml = `<button onclick="updateStatus('${order.id}', 'mark_ready')" class="w-full bg-yellow-600 hover:bg-yellow-500 py-4 rounded-lg text-xl font-bold text-white shadow-lg flex items-center justify-center gap-2"><i class="fas fa-check"></i> MARK READY</button>`;
                    statusText = 'PREPARING';
                    statusBg = 'bg-yellow-600 text-white';
                } else if (order.status === 'ready') {
                    statusColor = 'status-ready';
                    btnHtml = `<button onclick="updateStatus('${order.id}', 'complete')" class="w-full bg-green-600 hover:bg-green-500 py-4 rounded-lg text-xl font-bold text-white shadow-lg flex items-center justify-center gap-2"><i class="fas fa-check-double"></i> SERVE ORDER</button>`;
                    statusText = 'READY';
                    statusBg = 'bg-green-600 text-white';
                }

                card.className = `card-bg border-t-[8px] ${statusColor} rounded-xl shadow-xl flex flex-col h-[480px] relative group transition-all duration-300`;

                const typeStyle = order.orderType === 'Takeaway' 
                    ? 'text-blue-500 border-blue-500' 
                    : 'text-orange-500 border-orange-500';

                let itemsHtml = '';
                if(order.items && Array.isArray(order.items)) {
                    itemsHtml = order.items.map(item => `
                        <div class="flex items-start gap-4 p-3 hover:bg-gray-700/10 rounded cursor-pointer select-none transition border-b border-gray-700/20" onclick="toggleStrike(this)">
                            <span class="text-xl font-black ${appSettings.theme==='dark'?'text-gray-200':'text-gray-800'} w-8 text-right font-mono">${item.qty}</span>
                            <div class="flex-1">
                                <div class="text-lg font-bold ${appSettings.theme==='dark'?'text-white':'text-gray-900'} item-name leading-tight">${item.name}</div>
                                ${item.variantDetails || item.variant ? `<div class="text-sm font-bold text-orange-500 mt-1">${item.variantDetails || item.variant}</div>` : ''}
                            </div>
                        </div>
                    `).join('');
                }

                card.innerHTML = `
                    <div class="p-4 border-b border-gray-700/50 flex justify-between items-start">
                        <div class="w-full">
                            <div class="flex justify-between items-center mb-2">
                                <span class="text-sm font-bold px-3 py-1 rounded shadow ${statusBg}">${statusText}</span>
                                <div class="live-timer text-2xl font-black font-mono" data-ts="${orderTs}" data-id="${displayId}">00:00</div>
                            </div>
                            
                            <div class="flex justify-between items-end">
                                <div>
                                    <h3 class="text-4xl font-black ${appSettings.theme==='dark'?'text-white':'text-gray-800'}">#${displayId}</h3>
                                    <div class="text-xl font-bold ${appSettings.theme==='dark'?'text-gray-300':'text-gray-600'} truncate max-w-[180px] mt-1">${cName}</div>
                                </div>
                                <div class="text-2xl font-black uppercase border-2 px-3 py-1 rounded transform -rotate-2 ${typeStyle}">
                                    ${order.orderType || 'Dine-in'}
                                </div>
                            </div>
                        </div>
                    </div>

                    ${order.note ? `<div class="bg-yellow-500/20 border-l-4 border-yellow-500 p-3 text-lg font-bold text-yellow-500 m-2"><i class="fas fa-exclamation-triangle mr-2"></i> ${order.note}</div>` : ''}

                    <div class="p-2 flex-1 overflow-y-auto space-y-1 custom-scroll">
                        ${itemsHtml}
                    </div>

                    <div class="p-4 mt-auto">
                        ${btnHtml}
                    </div>
                `;
            });
        }

        function renderSummary() {
            const tbody = document.getElementById("summary-table-body");
            tbody.innerHTML = '';
            let itemMap = {};
            let totalItems = 0;

            orders.filter(o => ['pending', 'preparing'].includes(o.status)).forEach(order => {
                if(order.items && Array.isArray(order.items)) {
                    order.items.forEach(item => {
                        if(!itemMap[item.name]) itemMap[item.name] = { qty: 0, orders: [] };
                        itemMap[item.name].qty += parseInt(item.qty);
                        itemMap[item.name].orders.push('#'+(order.orderId || order.orderID));
                        totalItems += parseInt(item.qty);
                    });
                }
            });

            document.getElementById('badge-total-items').innerText = totalItems;

            Object.keys(itemMap).forEach(key => {
                tbody.innerHTML += `
                    <tr class="hover:bg-gray-700/50 transition border-b border-gray-700/50">
                        <td class="p-3 md:p-4 font-bold ${appSettings.theme==='dark'?'text-white':'text-gray-800'} text-lg">${key}</td>
                        <td class="p-3 md:p-4 text-center"><span class="bg-orange-600 text-white font-bold px-3 py-1 rounded-full text-lg">${itemMap[key].qty}</span></td>
                        <td class="p-3 md:p-4 text-right text-xs text-mute font-mono max-w-[100px] truncate">${itemMap[key].orders.join(', ')}</td>
                    </tr>`;
            });
        }

        function renderHistory() {
            const tbody = document.getElementById("history-table-body");
            const historyOrders = orders.filter(o => o.status === 'completed').sort((a,b) => b.completedAt - a.completedAt);
            
            if(historyOrders.length === 0) {
                tbody.innerHTML = '<tr><td colspan="5" class="p-8 text-center text-gray-500">No completed orders yet.</td></tr>';
                return;
            }

            tbody.innerHTML = historyOrders.map(o => {
                const dur = moment.duration(o.completedAt - o.timestamp);
                const timeString = `${Math.floor(dur.asMinutes())}m ${dur.seconds()}s`;
                const displayId = o.orderId || o.orderID || '---';

                return `
                <tr class="hover:bg-gray-700/10 transition border-b border-gray-700/20">
                    <td class="p-4 font-bold ${appSettings.theme==='dark'?'text-white':'text-gray-800'}">#${displayId}</td>
                    <td class="p-4 text-mute text-sm">
                        <div>${moment(o.completedAt).format('h:mm A')}</div>
                    </td>
                    <td class="p-4"><span class="text-xs font-bold px-2 py-1 rounded bg-gray-600 text-white">${o.orderType || 'Dine-in'}</span></td>
                    <td class="p-4 text-green-500 font-mono font-bold text-sm">${timeString}</td>
                    <td class="p-4 text-right">
                         <button onclick="recallOrder('${o.id}')" class="text-blue-500 hover:underline text-sm font-bold">Recall</button>
                    </td>
                </tr>
            `}).join('');
        }

        function updateStats() {
            const pending = orders.filter(o => o.status === 'pending').length;
            const prep = orders.filter(o => o.status === 'preparing').length;
            const ready = orders.filter(o => o.status === 'ready').length;
            
            document.getElementById('stat-pending').innerText = pending;
            document.getElementById('stat-prep').innerText = prep;
            document.getElementById('stat-ready').innerText = ready;
        }

        // --- 8. UTILS & TIMERS ---

        function playChime() {
            if(soundEnabled) {
                const audio = document.getElementById("kitchen-sound");
                audio.currentTime = 0;
                audio.play().catch(e => console.log("Audio Blocked", e));
            }
        }

        window.toggleSound = () => {
            soundEnabled = !soundEnabled;
            const btn = document.getElementById("sound-btn");
            if(soundEnabled) {
                btn.innerHTML = '<i class="fas fa-volume-up text-green-500"></i>';
                Toastify({ text: "Sound ON 🔊", style: { background: "#10B981" } }).showToast();
                // Try play
                const audio = document.getElementById("kitchen-sound");
                audio.play().then(()=>audio.pause()).catch(()=>{});
            } else {
                btn.innerHTML = '<i class="fas fa-volume-mute text-gray-400"></i>';
                Toastify({ text: "Sound OFF 🔇", style: { background: "#ef4444" } }).showToast();
            }
        }

        window.toggleStrike = (el) => el.querySelector('.item-name').classList.toggle('item-done');

        window.switchView = (viewName) => {
            document.querySelectorAll('.nav-item').forEach(el => el.classList.remove('active'));
            document.getElementById(`nav-${viewName}`).classList.add('active');
            document.querySelectorAll('.view-section').forEach(el => el.classList.add('hidden'));
            document.getElementById(`view-${viewName}`).classList.remove('hidden');
            
            // Re-render specifics
            if(viewName === 'history') renderHistory();
            if(viewName === 'summary') renderSummary();
            if(viewName === 'settings') {
                document.getElementById('setting-staff-name').value = appSettings.staffName;
            }
        }

        window.filterType = (type) => {
            currentFilter = type;
            document.getElementById('filter-all').className = type==='all' ? "px-3 py-1 rounded text-[10px] md:text-xs font-bold bg-gray-600 text-white" : "px-3 py-1 rounded text-[10px] md:text-xs font-bold text-gray-400 hover:text-white";
            document.getElementById('filter-Dine-in').className = type==='Dine-in' ? "px-3 py-1 rounded text-[10px] md:text-xs font-bold bg-orange-600 text-white" : "px-3 py-1 rounded text-[10px] md:text-xs font-bold text-gray-400 hover:text-white";
            document.getElementById('filter-Takeaway').className = type==='Takeaway' ? "px-3 py-1 rounded text-[10px] md:text-xs font-bold bg-blue-600 text-white" : "px-3 py-1 rounded text-[10px] md:text-xs font-bold text-gray-400 hover:text-white";
            renderDashboard();
        }

        // --- GLOBAL CLOCK & LATE ORDER ALERT LOOP ---
        setInterval(() => {
            const now = Date.now();
            document.getElementById('clock-time').innerText = moment().format('HH:mm');

            document.querySelectorAll('.live-timer').forEach(el => {
                const start = parseInt(el.dataset.ts);
                const oid = el.dataset.id;
                
                // Debug Check
                if(!start || isNaN(start)) return; 

                const diffMs = now - start;
                const duration = moment.duration(diffMs);
                const minutes = Math.floor(duration.asMinutes());
                const seconds = duration.seconds();
                const text = `${minutes.toString().padStart(2, '0')}:${seconds.toString().padStart(2, '0')}`;
                
                el.innerText = text;
                
                // Color Logic
                if (minutes >= 20) el.className = "live-timer text-2xl font-black font-mono text-red-600 blink-critical";
                else if (minutes >= 10) el.className = "live-timer text-2xl font-black font-mono text-red-500";
                else if (minutes >= 5) el.className = "live-timer text-2xl font-black font-mono text-yellow-500";
                else el.className = "live-timer text-2xl font-black font-mono text-green-500";

                // --- HINDI ALERT FOR LATE ORDERS (>10 Mins) ---
                if(minutes >= 10 && soundEnabled) {
                    // Check if we already alerted for this Order ID in this session
                    if(!announcedOrders.has(oid + '_10min')) {
                        announcedOrders.add(oid + '_10min');
                        speakHindi(`Order number ${oid} bahut der se pending hai, isko pura karo`);
                        
                        Toastify({ text: `⚠️ Order #${oid} is Late!`, style: { background: "#ef4444" } }).showToast();
                    }
                }
            });
        }, 1000);

        // START APP
        initRealtimeListener();

    </script>
</body>
</html>
